async function submitResult(data) {

    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        employeeName: data.employeeName,
        location:     data.location,
        bucket:       data.bucket,
        videoTitle:   data.videoTitle,
        score:        data.score,
        passFail:     data.passFail,
        date:         data.date
      })
    });

    console.error("Webhook error:", e);

  }

  certBtn:{background:"#0057A8",color:"#fff",border:"none",padding:"10px 26px",borderRadius:7,fontSize:13,fontWeight:700,cursor:"pointer"},
};

function QuizPanel({videoId,onComplete,onClose}) {
  const quiz=QUIZZES[videoId];
  const [ans,setAns]=useState({});
  const [done,setDone]=useState(false);
  const [score,setScore]=useState(0);
  if(!quiz) return <div style={S.qWrap}><div style={S.qHdr}><span style={S.qTitle}>No quiz</span><button style={S.closeBtn} onClick={onClose}>✕</button></div></div>;
  const allAns=Object.keys(ans).length===quiz.questions.length;
  const passed=score>=7;
  function submit(){
    if(!allAns){alert("Please answer all questions.");return;}
    let s=0;quiz.questions.forEach((q,i)=>{if(ans[i]===q.correct)s++;});
    setScore(s);setDone(true);
  }
  return(
    <div style={S.qWrap}>
      <div style={S.qHdr}>
        <div><div style={S.qLabel}>QUIZ · {Object.keys(ans).length}/{quiz.questions.length}</div><div style={S.qTitle}>{quiz.title}</div></div>
        <button style={S.closeBtn} onClick={onClose}>✕ Close</button>
      </div>
      {done?(
        <div style={S.rWrap}>
          <div style={S.rScore(passed)}>
            <div style={S.rNum}>{score}<span style={{fontSize:24}}>/10</span></div>
            <div style={S.rLbl}>{passed?"✅ PASSED":"❌ TRY AGAIN"}</div>
            <div style={S.rSub}>{passed?"Great work! Saving your result now...":"Need 7/10 to pass. Review the video and retry."}</div>
          </div>
          <div style={{padding:"0 22px"}}>
            {quiz.questions.map((q,i)=>{const ok=ans[i]===q.correct;return(
              <div key={i} style={S.revItem}>
                <div style={S.revQ}>{i+1}. {q.q}</div>
                <div style={{fontSize:11,color:ok?"#00c864":"#ff6060"}}>{ok?"✓":"✗"} {q.options[ans[i]]}</div>
                {!ok&&<div style={{fontSize:11,color:"#00c864",marginTop:2}}>✓ Correct: {q.options[q.correct]}</div>}
              </div>
            );})}
          </div>
          <div style={{padding:"12px 22px 22px",display:"flex",gap:10}}>
            <button style={S.finBtn} onClick={()=>onComplete(score,passed?"Pass":"Fail")}>{passed?"Continue →":"↩ Retry"}</button>
            {passed&&<button style={S.retBtn} onClick={()=>{setAns({});setDone(false);setScore(0);}}>Retake</button>}
          </div>
        </div>
      ):(
        <div style={S.qList}>
          {quiz.questions.map((q,i)=>(
            <div key={i} style={S.qBlock}>
              <div style={S.qNum}>Question {i+1} of {quiz.questions.length}</div>
              <div style={S.qText}>{q.q}</div>
              <div style={S.optList}>
                {q.options.map((opt,j)=>(
                  <div key={j} style={S.opt(ans[i]===j)} onClick={()=>setAns(p=>({...p,[i]:j}))}>
                    <span style={S.optDot(ans[i]===j)}>{ans[i]===j?"●":"○"}</span>
                    <span style={S.optTxt}>{opt}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
          <div style={{padding:"8px 22px 24px"}}>
            <div style={{fontSize:11,color:"#4a6a8a",marginBottom:9}}>{Object.keys(ans).length}/{quiz.questions.length} answered</div>
            <button style={allAns?S.subBtn:S.subBtnOff} onClick={submit}>Submit Quiz →</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultsModal({name,loc,bucket,video,score,pf,onDone}) {
  const [status,setStatus]=useState("submitting");
  const date=new Date().toISOString().split("T")[0];
  const passed=pf==="Pass";
  useEffect(()=>{
    if(!passed){setStatus("fail");return;}
    submitResult({employeeName:name,location:loc,bucket,videoTitle:video,score,passFail:pf,date})
      .then(r=>setStatus(r.success?"success":"error"));
  },[]);
  const icons={submitting:"⏳",success:"✅",fail:"📝",error:"⚠️"};
  const titles={submitting:"Saving Result...",success:"Result Saved!",fail:"Quiz Complete",error:"Save Issue"};
  return(
    <div style={S.overlay}>
      <div style={S.modal}>
        <div style={S.mHdr}>
          <div style={{fontSize:40,marginBottom:8}}>{icons[status]}</div>
          <div style={S.mTitle}>{titles[status]}</div>
          <div style={S.mScore(passed)}>{score}/10 — {pf}</div>
        </div>
        <div style={S.mBody}>
          <div style={S.mLabel}>RESULT SUMMARY</div>
          {[["Employee",name],["Location",loc],["Bucket",bucket],["Video",video],["Score",score+"/10"],["Result",pf],["Date",date]].map(([k,v])=>(
            <div key={k} style={S.mRow}>
              <span style={S.mKey}>{k}</span>
              <span style={{...S.mVal,color:k==="Result"?(passed?"#00c864":"#ff5050"):"#e8edf5",fontWeight:k==="Result"?700:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={S.mNote}>
          {status==="submitting"&&"⏳ Saving to SharePoint Training Results list..."}
          {status==="success"&&"✅ Result saved automatically! Your manager can see this now."}
          {status==="fail"&&"Review the video and retry when ready."}
          {status==="error"&&"⚠️ Could not auto-save. Please screenshot this and send to your manager."}
        </div>
        <div style={S.mBtns}>
          <button style={{...S.recBtn,opacity:status==="submitting"?0.5:1}} disabled={status==="submitting"} onClick={onDone}>
            {status==="submitting"?"Saving...":"Continue →"}
          </button>
        </div>
      </div>
    </div>
  );
}

function Certificate({bucket,name,onClose}) {
  return(
    <div style={S.certOv}>
      <div style={S.certBox}>
        <div style={{fontSize:52,marginBottom:10}}>🏆</div>
        <div style={S.certTop}>Certificate of Completion</div>
        <div style={S.certName}>{name}</div>
        <div style={S.certSub}>has successfully completed all training in</div>
        <div style={S.certBkt}>{bucket} Safety Training</div>
        <div style={S.certOrg}>North Country Tire Distributors<br/>{new Date().toLocaleDateString("en-CA",{year:"numeric",month:"long",day:"numeric"})}</div>
        <button style={S.certBtn} onClick={onClose}>Continue Training →</button>
      </div>
    </div>
  );
}

function App() {
  const [prog,setProg]=useState({done:{},scores:{}});
  const [bucket,setBucket]=useState("Warehouse");
  const [video,setVideo]=useState(null);
  const [quiz,setQuiz]=useState(false);
  const [modal,setModal]=useState(null);
  const [cert,setCert]=useState(null);
  const [name,setName]=useState("");
  const [loc,setLoc]=useState("");
  const [nameIn,setNameIn]=useState("");
  const [locIn,setLocIn]=useState("");
  const [started,setStarted]=useState(false);

  const total=Object.values(BUCKETS).reduce((a,b)=>a+b.videos.length,0);
  const totalDone=Object.keys(prog.done).length;
  const pct=Math.round(totalDone/total*100);
  function bktDone(b){return BUCKETS[b].videos.filter(v=>prog.done[v.id]).length;}
  function start(){
    if(!nameIn.trim()){alert("Please enter your name.");return;}
    if(!locIn){alert("Please select your location.");return;}
    setName(nameIn.trim());setLoc(locIn);setStarted(true);
  }
  function onQuizComplete(score,pf){setQuiz(false);setModal({score,pf});}
  function onModalDone(){
    if(!video||!modal)return;
    if(modal.pf==="Fail"){setModal(null);return;}
    const updated={done:{...prog.done,[video.id]:true},scores:{...prog.scores,[video.id]:modal.score}};
    setProg(updated);setModal(null);
    const b=VIDEO_TO_BUCKET[video.id];
    if(b&&BUCKETS[b].videos.every(v=>updated.done[v.id]))setCert(b);
  }
  const bData=BUCKETS[bucket];
  const bDone=bktDone(bucket);
  const bPct=Math.round(bDone/bData.videos.length*100);

  if(!started) return(
    <div style={{...S.app,justifyContent:"center"}}>
      <div style={S.hdr}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={S.logo}>NCT</div><div style={S.logoTxt}>Safety Training Portal</div></div></div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,justifyContent:"center",gap:18,padding:40}}>
        <div style={{fontSize:52}}>🦺</div>
        <div style={{fontSize:26,fontWeight:800,color:"#fff",textAlign:"center"}}>Welcome to NCT Safety Training</div>
        <div style={{color:"#7a9abf",fontSize:13,textAlign:"center",maxWidth:380,lineHeight:1.7}}>Enter your name and location to begin.<br/>Your results are recorded automatically.</div>
        <input style={S.nameInput} placeholder="Your full name" value={nameIn} onChange={e=>setNameIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&start()} autoFocus/>
        <select style={S.locSel} value={locIn} onChange={e=>setLocIn(e.target.value)}>
          <option value="">Select your location...</option>
          {["Edmonton","Calgary","Kelowna","Langley","Winnipeg"].map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        <button style={S.nameBtn} onClick={start}>Start Training →</button>
        <div style={{fontSize:11,color:"#2a4060"}}>Own Safety. Protect the Team.</div>
      </div>
    </div>
  );

  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={S.logo}>NCT</div>
          <div><div style={S.logoTxt}>Safety Training Portal</div><div style={{fontSize:10,color:"#4a6a8a"}}>👤 {name} · 📍 {loc}</div></div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:10,color:"#4a6a8a",letterSpacing:2,textTransform:"uppercase"}}>Overall Progress</div>
          <div style={{fontSize:26,fontWeight:900,color:"#00A8E8",lineHeight:1}}>{pct}%</div>
          <div style={{fontSize:10,color:"#4a6a8a"}}>{totalDone}/{total} complete</div>
          <div style={{width:130,height:4,background:"#1a2740",borderRadius:2,overflow:"hidden",marginTop:4}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#0057A8,#00A8E8)",transition:"width 0.6s"}}/>
          </div>
        </div>
      </div>
      {video&&!quiz&&(
        <div style={S.player}>
          <div style={S.pTitle}><span style={{color:"#00A8E8"}}>▶</span><span style={{flex:1}}>{video.title}</span><button style={S.closeBtn} onClick={()=>setVideo(null)}>✕ Close</button></div>
          <iframe style={S.vFrame} src={video.url} allowFullScreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" title={video.title}/>
          <div style={S.pBtns}>
            <button style={S.quizBtn} onClick={()=>setQuiz(true)}>📝 Take Quiz →</button>
            {prog.done[video.id]&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#00c864"}}>✅ Completed {prog.scores[video.id]!==undefined&&<span style={S.scoreTag(prog.scores[video.id])}>{prog.scores[video.id]}/10</span>}</div>}
          </div>
        </div>
      )}
      {video&&quiz&&<QuizPanel videoId={video.id} onComplete={onQuizComplete} onClose={()=>setQuiz(false)}/>}
      <div style={S.main}>
        <div style={S.sidebar}>
          {Object.entries(BUCKETS).map(([b,d])=>{
            const dn=bktDone(b),tot=d.videos.length,p=Math.round(dn/tot*100),act=bucket===b;
            return<div key={b} style={S.sideTab(act)} onClick={()=>{setBucket(b);setVideo(null);setQuiz(false);}}>
              <div style={{display:"flex",alignItems:"center"}}>
                <span style={{fontSize:15,marginRight:7}}>{d.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:act?700:500,color:act?"#fff":"#7a9abf"}}>{b}</div>
                  <div style={{fontSize:10,color:"#4a6a8a",marginTop:1}}>{dn}/{tot} · {p}%</div>
                </div>
                {dn===tot&&<span style={{fontSize:13}}>🏆</span>}
              </div>
              <div style={{marginTop:6,height:3,background:"#1a2740",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:p+"%",background:"linear-gradient(90deg,"+d.color+",#00A8E8)",transition:"width 0.5s"}}/>
              </div>
            </div>;
          })}
          <div style={{padding:"12px 14px",borderTop:"1px solid #111d2e",marginTop:"auto"}}>
            <div style={{fontSize:9,color:"#2a4060",lineHeight:1.6}}>Results auto-saved to SharePoint after each passed quiz.</div>
          </div>
        </div>
        <div style={S.content}>
          <div style={S.bktHead}>
            <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:6}}>{bData.icon} {bucket}</div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{fontSize:26,fontWeight:900,color:"#00A8E8",lineHeight:1}}>{bPct}%</div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#7a9abf",marginBottom:4}}>{bDone} of {bData.videos.length} videos complete</div>
                <div style={{height:5,background:"#1a2740",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:bPct+"%",background:"linear-gradient(90deg,#0057A8,#00A8E8)",transition:"width 0.5s"}}/>
                </div>
              </div>
            </div>
          </div>
          <div style={{display:"grid",gap:8}}>
            {bData.videos.map((v,i)=>{
              const dn=!!prog.done[v.id],sc=prog.scores[v.id],act=video?.id===v.id;
              return<div key={v.id} style={S.vCard(dn,act)} onClick={()=>{setVideo(v);setQuiz(false);}}>
                <div style={S.vNum(dn)}>{dn?"✓":i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:dn?"#6abf8a":act?"#fff":"#cde",lineHeight:1.3}}>{v.title}</div>
                  <div style={{fontSize:10,color:"#4a6a8a",marginTop:2}}>⏱ {v.dur}</div>
                </div>
                {sc!==undefined&&<span style={S.scoreTag(sc)}>{sc}/10</span>}
                {!dn&&<div style={{fontSize:13,color:"#2a4060"}}>▶</div>}
              </div>;
            })}
          </div>
        </div>
      </div>
      {modal&&video&&<ResultsModal name={name} loc={loc} bucket={VIDEO_TO_BUCKET[video.id]} video={video.title} score={modal.score} pf={modal.pf} onDone={onModalDone}/>}
      {cert&&<Certificate bucket={cert} name={name} onClose={()=>setCert(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
