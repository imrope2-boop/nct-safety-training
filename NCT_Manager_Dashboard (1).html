function pct(score) { return Math.round(score * 10) + "%"; }
function pctNum(score) { return Math.round(score * 10); }
function pctColor(score) {
  const p = pctNum(score);
  if(p >= 70) return "#00c864";
  if(p >= 50) return "#f0a500";
  return "#ff5050";
}

async function fetchResults() {
  const res = await fetch(READ_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({}) });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const arr = Array.isArray(data) ? data : (data.value || []);
  return arr.map(r => ({
    name:     r.Title     || r.fields?.Title     || "",
    location: r.Location  || r.fields?.Location  || "",
    bucket:   r.TrainingBucket || r.fields?.TrainingBucket || "",
    video:    r.VideoTitle|| r.fields?.VideoTitle || "",
    score:    Number(r.Score || r.fields?.Score  || 0),
    passFail: r.PassFail  || r.fields?.PassFail  || "",
    date:     (r.DateCompleted || r.fields?.DateCompleted || "").substring(0,10),
  }));
}

function KPI({label,value,sub,color}) {
  return (
    <div style={{background:"#0d1526",border:"1px solid #1a2d4a",borderRadius:10,padding:"18px 22px",flex:1,minWidth:140}}>
      <div style={{fontSize:10,letterSpacing:3,color:"#4a6a8a",textTransform:"uppercase",marginBottom:6}}>{label}</div>
      <div style={{fontSize:36,fontWeight:900,color:color||"#00A8E8",lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"#4a6a8a",marginTop:4}}>{sub}</div>}
    </div>
  );
}

function SimpleBar({data,dataKey,nameKey,color,suffix=""}) {
  if(!data.length) return <div style={{color:"#4a6a8a",fontSize:12,padding:20,textAlign:"center"}}>No data</div>;
  const max = Math.max(...data.map(d=>d[dataKey]),1);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,padding:"4px 0"}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:90,fontSize:11,color:"#7a9abf",textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d[nameKey]}</div>
          <div style={{flex:1,background:"#1a2740",borderRadius:3,height:22,overflow:"hidden"}}>
            <div style={{height:"100%",width:(d[dataKey]/max*100)+"%",background:`linear-gradient(90deg,${color||"#0057A8"},#00A8E8)`,borderRadius:3,transition:"width 0.6s",display:"flex",alignItems:"center",paddingLeft:6}}>
              <span style={{fontSize:10,color:"#fff",fontWeight:700,whiteSpace:"nowrap"}}>{d[dataKey]}{suffix}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function LoginGate({onAuth}) {
  const [pw,setPw]   = useState("");
  const [err,setErr] = useState(false);
  function tryLogin() {
    if(pw === PASSWORD) { onAuth(); }
    else { setErr(true); setPw(""); }
  }
  return (
    <div style={{background:"#0a0f1a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"linear-gradient(135deg,#0d1526,#111d2e)",border:"2px solid #0057A8",borderRadius:14,padding:"44px 48px",textAlign:"center",width:360}}>
        <img src={"data:image/png;base64,"+LOGO_B64} style={{height:52,width:"auto",objectFit:"contain",marginBottom:20}}/>
        <div style={{fontSize:11,letterSpacing:3,color:"#00A8E8",textTransform:"uppercase",fontWeight:700,marginBottom:6}}>Manager Dashboard</div>
        <div style={{fontSize:13,color:"#4a6a8a",marginBottom:28,lineHeight:1.6}}>Restricted access.<br/>Enter your manager password to continue.</div>
        <input
          type="password"
          placeholder="Password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          style={{width:"100%",padding:"12px 16px",fontSize:14,marginBottom:10,borderRadius:8,border:err?"2px solid #ff5050":"2px solid #2a4060"}}
          autoFocus
        />
        {err && <div style={{color:"#ff5050",fontSize:12,marginBottom:10}}>Incorrect password. Try again.</div>}
        <button onClick={tryLogin} style={{width:"100%",background:"linear-gradient(135deg,#0057A8,#00A8E8)",color:"#fff",border:"none",padding:"13px",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
          Access Dashboard →
        </button>
        <div style={{fontSize:10,color:"#2a4060",marginTop:18}}>NCT Safety Training · Managers Only</div>
      </div>
    </div>
  );
}

function Dashboard() {
  const [rows,setRows]       = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError]     = useState(null);
  const [lastRefresh,setLastRefresh] = useState(null);
  const [fName,setFName]     = useState("");
  const [fLoc,setFLoc]       = useState("All");
  const [fBkt,setFBkt]       = useState("All");
  const [fPF,setFPF]         = useState("All");
  const [fDateFrom,setFDateFrom] = useState("");
  const [fDateTo,setFDateTo]     = useState("");
  const [sortCol,setSortCol] = useState("date");
  const [sortDir,setSortDir] = useState("desc");
  const [tab,setTab]         = useState("overview");

  async function load() {
    setLoading(true); setError(null);
    try {
      const data = await fetchResults();
      setRows(data);
      setLastRefresh(new Date().toLocaleTimeString());
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }
  useEffect(()=>{ load(); },[]);

  const filtered = useMemo(()=>rows.filter(r=>{
    if(fName && !r.name.toLowerCase().includes(fName.toLowerCase())) return false;
    if(fLoc!=="All" && r.location!==fLoc) return false;
    if(fBkt!=="All" && r.bucket!==fBkt) return false;
    if(fPF!=="All" && r.passFail!==fPF) return false;
    if(fDateFrom && r.date < fDateFrom) return false;
    if(fDateTo   && r.date > fDateTo)   return false;
    return true;
  }),[rows,fName,fLoc,fBkt,fPF,fDateFrom,fDateTo]);

  const sorted = useMemo(()=>[...filtered].sort((a,b)=>{
    let av=a[sortCol], bv=b[sortCol];
    if(sortCol==="score"){av=Number(av);bv=Number(bv);}
    if(av<bv) return sortDir==="asc"?-1:1;
    if(av>bv) return sortDir==="asc"?1:-1;
    return 0;
  }),[filtered,sortCol,sortDir]);

  function toggleSort(col){ if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc"); else{setSortCol(col);setSortDir("asc");} }

  const total    = filtered.length;
  const passed   = filtered.filter(r=>r.passFail==="Pass").length;
  const passRate = total ? Math.round(passed/total*100) : 0;
  const uniqueEmps = new Set(filtered.map(r=>r.name)).size;
  const avgPct   = total ? Math.round(filtered.reduce((a,r)=>a+pctNum(r.score),0)/total) : 0;

  function groupBy(arr,key){ const m={}; arr.forEach(r=>{m[r[key]]=(m[r[key]]||0)+1;}); return Object.entries(m).map(([k,v])=>({name:k,count:v})).sort((a,b)=>b.count-a.count); }
  function avgPctBy(arr,key){ const m={},c={}; arr.forEach(r=>{m[r[key]]=(m[r[key]]||0)+pctNum(r.score);c[r[key]]=(c[r[key]]||0)+1;}); return Object.entries(m).map(([k,v])=>({name:k,avg:Math.round(v/c[k])})).sort((a,b)=>b.avg-a.avg); }

  const byLoc      = groupBy(filtered,"location");
  const byBkt      = groupBy(filtered,"bucket");
  const byEmp      = groupBy(filtered,"name").slice(0,10);
  const pctByLoc   = avgPctBy(filtered,"location");

  const tabStyle = active => ({padding:"8px 18px",cursor:"pointer",fontSize:12,fontWeight:active?700:500,color:active?"#fff":"#4a6a8a",borderBottom:active?"2px solid #00A8E8":"2px solid transparent",background:"transparent",border:"none",letterSpacing:1,textTransform:"uppercase"});
  const cardStyle = {background:"#0d1526",border:"1px solid #1a2d4a",borderRadius:10,padding:18};

  return (
    <div style={{fontFamily:"'Arial Narrow',Arial,sans-serif",background:"#0a0f1a",minHeight:"100vh",color:"#e8edf5"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#001F3F,#002a5c)",borderBottom:"3px solid #00A8E8",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <img src={"data:image/png;base64,"+LOGO_B64} style={{height:42,width:"auto",objectFit:"contain"}}/>
          <div>
            <div style={{fontSize:11,color:"#00A8E8",letterSpacing:3,textTransform:"uppercase",fontWeight:700}}>Manager Dashboard</div>
            <div style={{fontSize:10,color:"#4a6a8a"}}>Safety Training Results — Live Data</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {lastRefresh && <div style={{fontSize:10,color:"#4a6a8a"}}>Refreshed: {lastRefresh}</div>}
          <button onClick={load} style={{background:"linear-gradient(135deg,#0057A8,#00A8E8)",color:"#fff",border:"none",padding:"8px 18px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer"}}>↻ Refresh</button>
        </div>
      </div>

      {/* Filters */}
      <div style={{background:"#080d18",borderBottom:"1px solid #1a2d4a",padding:"12px 24px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{fontSize:10,color:"#4a6a8a",letterSpacing:2,textTransform:"uppercase",marginRight:4}}>Filters:</div>
        <input placeholder="Employee name..." value={fName} onChange={e=>setFName(e.target.value)} style={{width:160}}/>
        <select value={fLoc} onChange={e=>setFLoc(e.target.value)}>{LOCATIONS.map(l=><option key={l}>{l}</option>)}</select>
        <select value={fBkt} onChange={e=>setFBkt(e.target.value)}>{BUCKETS.map(b=><option key={b}>{b}</option>)}</select>
        <select value={fPF}  onChange={e=>setFPF(e.target.value)}>{PF.map(p=><option key={p}>{p}</option>)}</select>
        <input type="date" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)} title="From date"/>
        <input type="date" value={fDateTo}   onChange={e=>setFDateTo(e.target.value)}   title="To date"/>
        <button onClick={()=>{setFName("");setFLoc("All");setFBkt("All");setFPF("All");setFDateFrom("");setFDateTo("");}} style={{background:"transparent",border:"1px solid #2a4060",color:"#7a9abf",padding:"6px 12px",borderRadius:6,fontSize:11,cursor:"pointer"}}>Clear</button>
        <div style={{marginLeft:"auto",fontSize:11,color:"#4a6a8a"}}>{filtered.length} of {rows.length} records</div>
      </div>

      {/* Tabs */}
      <div style={{background:"#080d18",borderBottom:"1px solid #1a2d4a",padding:"0 24px",display:"flex",gap:4}}>
        {[["overview","📊 Overview"],["charts","📈 Charts"],["table","📋 All Results"]].map(([t,l])=>(
          <button key={t} style={tabStyle(tab===t)} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      <div style={{padding:24}}>
        {loading && <div style={{textAlign:"center",padding:60}}><div style={{fontSize:40,marginBottom:12}}>⏳</div><div style={{color:"#7a9abf",fontSize:14}}>Loading training results...</div></div>}
        {error && (
          <div style={{background:"rgba(255,80,80,0.08)",border:"2px solid rgba(255,80,80,0.3)",borderRadius:10,padding:24,textAlign:"center"}}>
            <div style={{fontSize:30,marginBottom:8}}>⚠️</div>
            <div style={{color:"#ff6060",fontWeight:700,marginBottom:4}}>Could not load data</div>
            <div style={{color:"#7a9abf",fontSize:12,marginBottom:16}}>{error}</div>
            <button onClick={load} style={{background:"#0057A8",color:"#fff",border:"none",padding:"9px 22px",borderRadius:7,fontSize:13,cursor:"pointer"}}>Retry</button>
          </div>
        )}

        {!loading && !error && tab==="overview" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
              <KPI label="Total Completions" value={total} sub="quiz passes recorded"/>
              <KPI label="Employees Trained" value={uniqueEmps} sub="distinct names"/>
              <KPI label="Pass Rate" value={passRate+"%"} sub={passed+" passed / "+(total-passed)+" failed"} color={passRate>=80?"#00c864":passRate>=60?"#f0a500":"#ff5050"}/>
              <KPI label="Avg Score" value={avgPct+"%"} sub="average across all quizzes" color={avgPct>=70?"#00c864":avgPct>=50?"#f0a500":"#ff5050"}/>
              <KPI label="Locations Active" value={byLoc.length} sub="of 5 branches"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Completions by Location</div><SimpleBar data={byLoc} dataKey="count" nameKey="name" color="#0057A8"/></div>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Completions by Training Bucket</div><SimpleBar data={byBkt} dataKey="count" nameKey="name" color="#004A8C"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Top Employees by Completions</div><SimpleBar data={byEmp} dataKey="count" nameKey="name" color="#005FA3"/></div>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Avg Score % by Location</div><SimpleBar data={pctByLoc} dataKey="avg" nameKey="name" color="#003D7A" suffix="%"/></div>
            </div>
          </div>
        )}

        {!loading && !error && tab==="charts" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
              {[{title:"By Location",data:byLoc,color:"#0057A8"},{title:"By Bucket",data:byBkt,color:"#004A8C"},{title:"By Employee (Top 10)",data:byEmp,color:"#005FA3"}].map(({title,data,color})=>(
                <div key={title} style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>{title}</div><SimpleBar data={data} dataKey="count" nameKey="name" color={color}/></div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Avg Score % by Location</div><SimpleBar data={pctByLoc} dataKey="avg" nameKey="name" color="#003D7A" suffix="%"/></div>
              <div style={cardStyle}><div style={{fontSize:11,color:"#00A8E8",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>Pass vs Fail</div><SimpleBar data={[{name:"Pass",count:passed},{name:"Fail",count:total-passed}]} dataKey="count" nameKey="name" color="#0057A8"/></div>
            </div>
          </div>
        )}

        {!loading && !error && tab==="table" && (
          <div style={cardStyle}>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead>
                  <tr>
                    {[["name","Employee"],["location","Location"],["bucket","Bucket"],["video","Video"],["score","Score %"],["passFail","Result"],["date","Date"]].map(([col,lbl])=>(
                      <th key={col} onClick={()=>toggleSort(col)}>{lbl} {sortCol===col?(sortDir==="asc"?"↑":"↓"):"↕"}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.length===0 && <tr><td colSpan={7} style={{textAlign:"center",color:"#4a6a8a",padding:30}}>No results match current filters</td></tr>}
                  {sorted.map((r,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:600,color:"#fff"}}>{r.name}</td>
                      <td>{r.location}</td>
                      <td><span style={{background:"rgba(0,87,168,0.2)",padding:"2px 8px",borderRadius:12,fontSize:11}}>{r.bucket}</span></td>
                      <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.video}</td>
                      <td style={{fontWeight:700,color:pctColor(r.score)}}>{pct(r.score)}</td>
                      <td><span style={{fontWeight:700,color:r.passFail==="Pass"?"#00c864":"#ff5050"}}>{r.passFail==="Pass"?"✅ Pass":"❌ Fail"}</span></td>
                      <td style={{color:"#4a6a8a"}}>{r.date}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:12,fontSize:11,color:"#4a6a8a",textAlign:"right"}}>{sorted.length} records shown</div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [auth,setAuth] = useState(false);
  return auth ? <Dashboard/> : <LoginGate onAuth={()=>setAuth(true)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
